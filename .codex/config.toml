[mcp_servers.next-devtools]
command = "npx"
args = ["-y", "next-devtools-mcp@latest"]

[mcp_servers.next-devtools.env]
PATH = "/Users/jeffreywang/.nvm/versions/node/v23.11.0/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
NODE_SKIP_PLATFORM_CHECK = "1"

[mcp_servers.daisyui]
command = "npx"
args = ["daisyui-mcp-server@latest"]

[mcp_servers.daisyui.env]
PATH = "/Users/jeffreywang/.nvm/versions/node/v23.11.0/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
NODE_SKIP_PLATFORM_CHECK = "1"

[mcp_servers.cloudflare]
command = "npx"
args = ["mcp-remote", "https://docs.mcp.cloudflare.com/mcp"]

[mcp_servers.cloudflare.env]
PATH = "/Users/jeffreywang/.nvm/versions/node/v23.11.0/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
NODE_SKIP_PLATFORM_CHECK = "1"

